version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: astra-postgres
    environment:
      POSTGRES_DB: astra_db
      POSTGRES_USER: astra
      POSTGRES_PASSWORD: astra123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - astra-network

  redis:
    image: redis:7-alpine
    container_name: astra-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - astra-network

  minio:
    image: minio/minio
    container_name: astra-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: astra_admin
      MINIO_ROOT_PASSWORD: astra_minio_2024
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - astra-network

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    container_name: astra-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://astra:astra123@postgres:5432/astra_db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
      - uploads_data:/app/data/uploads
    networks:
      - astra-network

  celery_worker:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    container_name: astra-celery
    command: celery -A core.celery_app worker --loglevel=info --concurrency=4
    environment:
      DATABASE_URL: postgresql+asyncpg://astra:astra123@postgres:5432/astra_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
    depends_on:
      - postgres
      - redis
    networks:
      - astra-network

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend/Dockerfile
    container_name: astra-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - astra-network

  nginx:
    image: nginx:alpine
    container_name: astra-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
    networks:
      - astra-network

volumes:
  postgres_data:
  redis_data:
  minio_data:
  uploads_data:

networks:
  astra-network:
    driver: bridge
